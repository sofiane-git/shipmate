name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck scripts/*.sh templates/*.sh hooks/pre-commit setup-dev.sh

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: validate schema + fixtures
        run: |
          npx -y ajv-cli@5.0.0 validate --spec=draft2020 -s schemas/shipmate-config.schema.json -d examples/config-valid.json
          for f in examples/*/expected.shipmate.json; do
            npx -y ajv-cli@5.0.0 validate --spec=draft2020 -s schemas/shipmate-config.schema.json -d "$f"
          done

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: install bats
        run: npm install -g bats@1.13.0
      - name: run tests
        run: bats tests

  frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: lint SKILL.md frontmatter
        run: |
          python3 - <<'PY'
          import re, glob, sys, yaml
          bad = 0
          for f in glob.glob("skills/*/SKILL.md"):
              t = open(f).read()
              m = re.match(r'^---\n(.*?)\n---\n', t, re.S)
              if not m:
                  print(f"{f}: missing frontmatter"); bad = 1; continue
              try:
                  fm = yaml.safe_load(m.group(1))
              except yaml.YAMLError as e:
                  print(f"{f}: unparseable frontmatter: {e}"); bad = 1; continue
              if not fm.get("name") or len(fm.get("description", "")) <= 40:
                  print(f"{f}: name/description invalid"); bad = 1
              else:
                  print(f"{f}: OK ({fm['name']})")
          sys.exit(bad)
          PY
